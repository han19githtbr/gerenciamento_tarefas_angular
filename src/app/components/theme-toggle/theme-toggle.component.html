<button class="theme-toggle" (click)="toggle()" [attr.aria-label]="(isDark$ | async) ? 'Mudar para tema claro' : 'Mudar para tema escuro'" [class.theme-toggle--light]="!(isDark$ | async)">
  <div class="theme-toggle__track">
    <div class="theme-toggle__thumb">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="4" fill="currentColor"/>
        <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
      </svg>
    </div>
    <span class="theme-toggle__stars">
      <span class="star star--1"></span>
      <span class="star star--2"></span>
      <span class="star star--3"></span>
    </span>
  </div>
  <span class="theme-toggle__label">{{ (isDark$ | async) ? 'Dark' : 'Light' }}</span>
</button>
