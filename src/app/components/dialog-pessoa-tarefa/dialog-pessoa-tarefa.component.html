<div class="modal-container">
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title" mat-dialog-title>{{data.title}}</h5>
      <button type="button" class="close" mat-dialog-close>
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <mat-dialog-content>
      <div class="modal-body">
        <div class="form-outline formatar-mat-form">
          <p class="form-label">Confirma a alocação de <strong>{{data.nomePessoa}}</strong>?</p>
        </div>
        <div class="form-outline formatar-mat-form" style="margin-top: 1rem;">
          <label class="form-label" for="emailPessoa">
            E-mail Google da pessoa <span style="color:red">*</span>
          </label>
          <input
            type="email"
            id="emailPessoa"
            class="form-control"
            [(ngModel)]="emailPessoa"
            placeholder="exemplo@gmail.com"
            style="width:100%; padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px;"
          />
          <small style="color:#666;">
            Com este e-mail a pessoa poderá fazer login e ver apenas suas tarefas.
          </small>
        </div>
      </div>
    </mat-dialog-content>
    <div class="modal-footer">
      <mat-dialog-actions class="justify-content-end">
        <button type="button" class="btn btn-secondary mr-1" (click)="salvar('Não')">Não</button>
        <button class="btn btn-primary"
          [disabled]="disableBox || !emailPessoa || !emailPessoa.includes('@')"
          (click)="salvar('Sim')"
          type="submit">Sim
        </button>
      </mat-dialog-actions>
    </div>
  </div>
</div>
