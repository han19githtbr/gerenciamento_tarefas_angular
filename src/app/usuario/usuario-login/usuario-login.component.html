<div class="login-wrapper">
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>
  <div class="grid-overlay"></div>

  <div class="login-card">
    <div class="card-shine"></div>

    <div class="login-logo">
      <div class="logo-ring"></div>
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="18" fill="url(#userGrad)"/>
        <path d="M32 14L46 22V38L32 46L18 38V22L32 14Z" fill="rgba(255,255,255,0.12)"/>
        <path d="M32 20L41 25V35L32 40L23 35V25L32 20Z" fill="rgba(255,255,255,0.08)"/>
        <circle cx="32" cy="32" r="6" fill="white" opacity="0.95"/>
        <circle cx="32" cy="32" r="10" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
        <defs>
          <linearGradient id="userGrad" x1="0" y1="0" x2="64" y2="64">
            <stop offset="0%" stop-color="#00c6fb"/>
            <stop offset="50%" stop-color="#005bea"/>
            <stop offset="100%" stop-color="#0a2463"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="login-badge">
      <span class="badge-dot"></span>
      Portal do Colaborador
    </div>

    <div class="login-titles">
      <h1>Task<span>Flow</span></h1>
      <p class="login-subtitle">Área do Colaborador</p>
    </div>

    <p class="login-desc">Acesse suas tarefas, acompanhe prazos<br>e interaja com sua equipe.</p>

    <div class="features-list">
      <div class="feature-item">
        <div class="feature-icon feature-icon--yellow">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14">
            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/>
          </svg>
        </div>
        <span>Veja suas tarefas alocadas</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon feature-icon--blue">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/>
          </svg>
        </div>
        <span>Acompanhe prazos e status</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon feature-icon--green">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14">
            <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7z" clip-rule="evenodd"/>
          </svg>
        </div>
        <span>Envie dúvidas ao administrador</span>
      </div>
    </div>

    <div class="google-btn-wrapper">
      <div id="google-btn-user" class="google-sdk-btn"></div>
    </div>

    <div class="login-footer">
      <a (click)="voltarInicio()" class="footer-link">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
        Voltar à tela inicial
      </a>
      <span class="sep">·</span>
      <a routerLink="/admin/login" class="footer-link">Área Admin</a>
    </div>
  </div>
</div>
