<div class="login-wrapper">
  <canvas class="particles-canvas" #particlesCanvas></canvas>
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>

  <div class="login-card">
    <div class="card-shine"></div>

    <div class="login-logo">
      <div class="logo-ring"></div>
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="18" fill="url(#adminGrad)"/>
        <path d="M32 14L46 22V38L32 46L18 38V22L32 14Z" fill="rgba(255,255,255,0.12)"/>
        <path d="M32 20L41 25V35L32 40L23 35V25L32 20Z" fill="rgba(255,255,255,0.08)"/>
        <circle cx="32" cy="32" r="6" fill="white" opacity="0.95"/>
        <circle cx="32" cy="32" r="10" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
        <defs>
          <linearGradient id="adminGrad" x1="0" y1="0" x2="64" y2="64">
            <stop offset="0%" stop-color="#ff4d6d"/>
            <stop offset="50%" stop-color="#c9184a"/>
            <stop offset="100%" stop-color="#7b2ff7"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="login-badge">
      <span class="badge-dot"></span>
      Admin
    </div>

    <div class="login-titles">
      <h1>Task<span>Flow</span></h1>
      <p class="login-subtitle">Painel Administrativo</p>
    </div>

    <p class="login-desc">Acesso restrito ao administrador do sistema.<br>Apenas contas autorizadas podem entrar.</p>

    <div class="divider"><span>autenticação segura</span></div>

    <div class="lock-box">
      <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Acesso protegido por e-mail autorizado</span>
    </div>

    <div class="google-btn-wrapper">
      <div id="google-btn"></div>
    </div>

    <div class="login-footer">
      <a (click)="voltarInicio()" class="footer-link">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
        Voltar à tela inicial
      </a>
    </div>
  </div>
</div>
